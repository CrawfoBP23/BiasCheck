{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>BiasCheck</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
text-align:center;
margin:0;
padding-top:80px;
}

.container{
width:750px;
margin:auto;
}

h1{
font-size:42px;
color:#333;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:40px;
}

.search-area{
margin-bottom:30px;
}

.search-bar{
width:70%;
padding:14px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:14px 24px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#0056b3;
}

.results{
display: none;
margin-top:30px;
text-align:left;
}

.article{
background:white;
padding:20px;
margin:0px 10px 20px 10px;
border-radius:10px;
box-shadow:0px 3px 8px rgba(0,0,0,0.08);
}

.article h3{
margin-top:0;
}

.meta{
color:#777;
font-size:14px;
margin-bottom:8px;
}

.summary{
margin-top:10px;
margin-bottom:12px;
}

.bias-box{
background:#f9f9f9;
padding:12px;
border-radius:6px;
margin-top:10px;
font-size:14px;
}

.bias-bar{
height:8px;
background:#e0e0e0;
border-radius:4px;
overflow:hidden;
margin-top:6px;
}

.bias-fill{
height:100%;
}

.loading{
font-size:18px;
color:#666;
margin-top:30px;
text-align:center;
}
.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e0e0e0;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}


.group-summary{
display: none;
background:white;
padding:20px;
padding-left: 30px;
padding-right: 30px;
margin:0px 10px 20px 10px;
border-radius:10px;
box-shadow:0px 3px 8px rgba(0,0,0,0.08);
}

</style>
</head>


<body>

<div class="container">

<h1>BiasCheck</h1>

<p class="subtitle">Search news topics and analyse media bias</p>

<div class="search-area">

<input id="topic" class="search-bar" placeholder="Search topic...">

<button onclick="searchNews()">Search</button>

</div>

<div id="results" class="results"></div>

<div id="group-summary" class="group-summary"></div>

</div>


<script>

async function searchNews(){

const topic = document.getElementById("topic").value

if(!topic){
return
}

document.getElementById("results").style.display = 'block';
document.getElementById("results").innerHTML =
`<div class="loading">
    <div class="spinner"></div>
    Analysing news articles...
</div>`

document.getElementById("group-summary").style.display = 'none';

const response = await fetch(`/api/search/?topic=${topic}`)

const data = await response.json()

let resultsHTML = `<p style='text-align:center'>There are ${data.articles.length} articles found in ${data.elapsed}s</p>`

data.articles.forEach(article => {
console.log(article.bias)
const bias = article.bias || {}

const score = bias.score || 0
const percent = ((score + 10) / 20) * 100
biasbar_qualitative = "Not biased"
if (percent === 0) {
    biasbar_qualitative = "Not biased"
} else if (percent <= 20) {
    biasbar_qualitative = "Minimal bias"
} else if (percent <= 60) {
    biasbar_qualitative = "Moderate bias"
} else if (percent <= 80) {
    biasbar_qualitative = "Strong bias"
} else {
    biasbar_qualitative = "Highly biased!"
}
const r = Math.round(255 * (percent / 100))
const g = Math.round(255 * (1 - percent / 100))
const color = `rgb(${r}, ${g}, 0)`
resultsHTML += `

<div class="article">

<h3>${article.title}</h3>

<div class="meta">
${article.source || "Unknown Source"}
</div>

<p class="summary">
${article.summary || ""}
</p>

<a href="${article.url}" target="_blank">Read Article</a>

<div class="bias-box">

<strong>Political position:</strong> ${bias.label || "Unknown"}

<br/><strong>Bias Bar: </strong> ${biasbar_qualitative || "Unknown"}
<div class="bias-bar">
<div class="bias-fill" style="width:${percent}%; background:rgb(${Math.round(255*(percent/100))}, ${Math.round(255*(1-percent/100))}, 0)"></div>
</div>

<p>
<strong>Claims:</strong> ${(bias.claims || []).join(", ")}
</p>

<p>
<strong>Indicators:</strong> ${(bias.indicators || []).join(", ")}
</p>
<p>
${bias.summary || ""}
</p>

</div>

</div>

`

})


document.getElementById("results").style.display = 'block';
document.getElementById("results").innerHTML = resultsHTML


document.getElementById("group-summary").style.display = 'block';
document.getElementById("group-summary").innerHTML = `

<p>
<strong>View(s):</strong> ${data.group_summary.view }
</p>

<p>
<strong>Detail:</strong> ${data.group_summary.detail}
</p>
<p>
<strong>Summary:</strong> ${data.group_summary.summary}
</p>`

}


// allow Enter key to search

document.getElementById("topic").addEventListener("keydown", function(event) {

if (event.key === "Enter") {
event.preventDefault()
searchNews()
}

})

</script>

</body>
</html>
