<!DOCTYPE html>
<html>
<head>
<title>BiasCheck</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin-top:100px;
}

.container{
width:600px;
margin:auto;
}

h1{
font-size:40px;
color:#333;
}

.search-bar{
width:80%;
padding:15px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:15px 25px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#0056b3;
}

.results{
margin-top:40px;
text-align:left;
}

.article{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0px 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="container">

<h1>BiasCheck</h1>

<p>Search for news topics and analyze articles</p>

<input id="topic" class="search-bar" placeholder="Search topic...">

<button onclick="searchNews()">Search</button>

<div id="results" class="results"></div>

</div>

<script>

async function searchNews(){

const topic = document.getElementById("topic").value

const response = await fetch(`/api/search/?topic=${topic}`)

const data = await response.json()

let resultsHTML = ""

data.articles.forEach(article => {

resultsHTML += `
<div class="article">
<h3>${article.title}</h3>
<p>${article.source}</p>
<p>${article.description}</p>
<a href="${article.url}" target="_blank">Read Article</a>
<p>${article.content}</p>
</div>
`

})

document.getElementById("results").innerHTML = resultsHTML

}

// Allow pressing Enter in the input to trigger the search
document.getElementById("topic").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    searchNews();
  }
});

</script>

</body>
</html>
