{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>BiasCheck</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
margin:0;
padding:70px 0;
text-align:center;
}

.container{
width:950px;
max-width:95%;
margin:auto;
}

h1{
font-size:52px;
margin-bottom:6px;
}

.subtitle{
color:#555;
margin-bottom:30px;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;
}

.search-bar{
width:65%;
padding:16px;
font-size:18px;
border-radius:12px;
border:1px solid #ccc;
}

button{
padding:16px 28px;
font-size:18px;
background:linear-gradient(135deg,#6366f1,#7c3aed);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.results{
margin-top:30px;
text-align:left;
}

.article{
background:white;
padding:22px;
border-radius:14px;
margin-bottom:22px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:transform .2s;
}

.article:hover{
transform:translateY(-4px);
}

.article h3{
margin-top:0;
}

.meta{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.summary{
margin-bottom:10px;
}

.bias-box{
margin-top:12px;
padding:10px;
background:#f3f4f6;
border-radius:10px;
}

.bias-bar{
height:10px;
background:#e5e7eb;
border-radius:5px;
overflow:hidden;
margin-top:6px;
}

.bias-fill{
height:100%;
background:#ef4444;
transition:width .5s ease;
}

.loading{
font-size:18px;
color:#555;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

.trending{
margin-bottom:25px;
color:#555;
}

.trending span{
background:#e0e7ff;
padding:6px 12px;
border-radius:20px;
margin:4px;
display:inline-block;
cursor:pointer;
transition:.2s;
}

.trending span:hover{
background:#c7d2fe;
transform:scale(1.05);
}

</style>
</head>


<body>

<div class="container">

<h1>📰 BiasCheck</h1>
<p class="subtitle">Search news topics and detect media bias with AI</p>

<div class="trending">

Trending:
<span onclick="setTopic('AI')">AI</span>
<span onclick="setTopic('Ukraine')">Ukraine</span>
<span onclick="setTopic('F1')">F1</span>
<span onclick="setTopic('Elections')">Elections</span>
<span onclick="setTopic('Crypto')">Crypto</span>

</div>


<div class="search-box">

<input id="topic" class="search-bar" placeholder="Search a topic...">

<button onclick="searchNews()">Search</button>

</div>


<div id="results" class="results"></div>

</div>


<script>


async function searchNews(){

const topic = document.getElementById("topic").value

if(!topic){
alert("Enter a topic")
return
}

document.getElementById("results").innerHTML =
'<p class="loading">🔎 Searching news...</p>'

const response = await fetch(`/api/search/?topic=${encodeURIComponent(topic)}`)
const articles = await response.json()

let html=""

articles.forEach((article,i)=>{

html+=`

<div class="article">

<h3>${article.title}</h3>

<div class="meta">
${article.source || "Unknown source"}
</div>

<p class="summary">
${article.summary || ""}
</p>

<a href="${article.url}" target="_blank">Read Article</a>

<div class="bias-box" id="bias-${i}">
🤖 Analyzing bias...
</div>

</div>

`

})

document.getElementById("results").innerHTML = html



// run bias analysis after results render

articles.forEach(async (article,i)=>{

try{

const response = await fetch(
`/api/analyze/?url=${encodeURIComponent(article.url)}
&title=${encodeURIComponent(article.title)}
&summary=${encodeURIComponent(article.summary || "")}`
)

const bias = await response.json()

const percent = bias.percent ?? 0

document.getElementById(`bias-${i}`).innerHTML = `
<strong>Bias Level:</strong> ${percent.toFixed(0)}%

<div class="bias-bar">
<div class="bias-fill" style="width:${percent}%"></div>
</div>

<p style="margin-top:10px">
<b>Why this rating:</b><br>
${bias.explanation ?? "No explanation available."}
</p>
`

}catch{

document.getElementById(`bias-${i}`).innerHTML =
"Bias analysis unavailable"

}

})

}


function setTopic(topic){
document.getElementById("topic").value = topic
searchNews()
}


document.getElementById("topic").addEventListener("keydown",function(e){

if(e.key==="Enter"){
searchNews()
}

})

</script>


</body>
</html>
