<!DOCTYPE html>
<html>
<head>

<title>BiasCheck</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
text-align:center;
margin:0;
padding-top:80px;
}

.container{
width:750px;
margin:auto;
}

h1{
font-size:42px;
color:#333;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:40px;
}

.search-area{
margin-bottom:30px;
}

.search-bar{
width:70%;
padding:14px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:14px 24px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#0056b3;
}

.results{
margin-top:30px;
text-align:left;
}

.article{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0px 3px 8px rgba(0,0,0,0.08);
}

.article h3{
margin-top:0;
}

.meta{
color:#777;
font-size:14px;
margin-bottom:8px;
}

.summary{
margin-top:10px;
margin-bottom:12px;
}

.bias-box{
background:#f9f9f9;
padding:12px;
border-radius:6px;
margin-top:10px;
font-size:14px;
}

.bias-bar{
height:8px;
background:#e0e0e0;
border-radius:4px;
overflow:hidden;
margin-top:6px;
}

.bias-fill{
height:100%;
}

.loading{
font-size:18px;
color:#666;
margin-top:30px;
}

</style>
</head>


<body>

<div class="container">

<h1>BiasCheck</h1>

<p class="subtitle">Search news topics and analyze media bias</p>

<div class="search-area">

<input id="topic" class="search-bar" placeholder="Search topic...">

<button onclick="searchNews()">Search</button>

</div>

<div id="results" class="results"></div>

</div>


<script>

async function searchNews(){

const topic = document.getElementById("topic").value

if(!topic){
return
}

document.getElementById("results").innerHTML =
'<div class="loading">Analyzing news articles...</div>'

const response = await fetch(`/api/search/?topic=${topic}`)

const data = await response.json()

let resultsHTML = ""

data.articles.forEach(article => {
console.log(article.bias)
const bias = article.bias || {}

const score = bias.score || 0
const percent = ((score + 10) / 20) * 100
const r = Math.round(255 * (percent / 100))
const g = Math.round(255 * (1 - percent / 100))
const color = `rgb(${r}, ${g}, 0)`
resultsHTML += `

<div class="article">

<h3>${article.title}</h3>

<div class="meta">
${article.source || "Unknown Source"}
</div>

<p class="summary">
${article.summary || ""}
</p>

<a href="${article.url}" target="_blank">Read Article</a>

<div class="bias-box">

<strong>Political position:</strong> ${bias.label || "Unknown"}

<div class="bias-bar">
<div class="bias-fill" style="width:${percent}%; background:rgb(${Math.round(255*(percent/100))}, ${Math.round(255*(1-percent/100))}, 0)"></div>
</div>

<p>
<strong>Indicators:</strong> ${(bias.indicators || []).join(", ")}
</p>

<p>
${bias.summary || ""}
</p>

</div>

</div>

`

})

document.getElementById("results").innerHTML = resultsHTML

}


// allow Enter key to search

document.getElementById("topic").addEventListener("keydown", function(event) {

if (event.key === "Enter") {
event.preventDefault()
searchNews()
}

})

</script>

</body>
</html>
